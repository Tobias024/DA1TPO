# =====================================================================
# Perfil DEV — H2 en archivo (persiste entre reinicios). Usar con:
#   mvn spring-boot:run -Dspring-boot.run.profiles=dev
# =====================================================================

# H2 en archivo. Los datos quedan en backend/data/subastar.mv.db
spring.datasource.url=jdbc:h2:file:./data/subastar;MODE=PostgreSQL;AUTO_SERVER=TRUE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# JPA — `update` mantiene tablas y datos, solo aplica cambios de schema.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# Consola web de H2 (http://localhost:8080/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Mail desactivado en dev (sin SMTP)
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.mail.MailSenderAutoConfiguration
