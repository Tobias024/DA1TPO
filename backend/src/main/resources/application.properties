# ==========================================
# SubastApp Backend - Application Properties
# ==========================================

# Server
server.port=8080
spring.application.name=subastapp

# Database - PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/subastapp
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# JWT Configuration
jwt.secret=SubastAppSecretKeyForJWTSigningMustBe256BitsLongOrMore
jwt.expiration=86400000
jwt.refresh-expiration=604800000

# File Upload (for document/item photos)
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=60MB

# Mail (configure with real SMTP for production)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:noreply@subastapp.com}
spring.mail.password=${MAIL_PASSWORD:changeme}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Swagger / OpenAPI
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# CORS (allow React Native dev server and production)
app.cors.allowed-origins=http://localhost:8081,http://10.0.2.2:8081,https://subastapp.com

# Subastas - ciclo de vida del item
# Plazo de pago tras la adjudicacion, en minutos (real: 4320 = 72hs; demo: 5).
subastar.plazo-pago-minutos=5
# Periodo del scheduler que cierra/adjudica items y aplica multas, en ms.
subastar.scheduler-ms=30000

# Logging
logging.level.com.subastapp=DEBUG
logging.level.org.springframework.security=WARN
